name: Setup Labels

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = [
              { name: 'ai-task',            color: '0075ca', description: 'Claude가 작업 가능한 Issue' },
              { name: 'ai-review',           color: 'e4e669', description: 'Claude에게 검토만 요청' },
              { name: 'ai-docs',             color: '0052cc', description: '문서 수정 요청' },
              { name: 'ai-bugfix',           color: 'd73a4a', description: '버그 수정 요청' },
              { name: 'ai-refactor-small',   color: 'fbca04', description: '소규모 리팩토링 요청' },
              { name: 'needs-human-review',  color: 'e11d48', description: '사람 검토 필요' },
              { name: 'blocked',             color: 'b60205', description: '자동 작업 중단' },
              { name: 'do-not-ai',           color: '000000', description: 'AI 작업 금지' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                console.log(`Created: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label,
                  });
                  console.log(`Updated: ${label.name}`);
                } else {
                  throw e;
                }
              }
            }
