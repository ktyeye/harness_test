name: Claude Issue Worker

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: '처리할 Issue 번호 (선택)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    # ai-task 라벨 추가 / @claude 댓글 / 수동 실행 시에만 동작
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
        contains(github.event.issue.labels.*.name, 'ai-task') &&
        !contains(github.event.issue.labels.*.name, 'do-not-ai') &&
        !contains(github.event.issue.labels.*.name, 'blocked')) ||
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.user.login != 'github-actions[bot]' &&
        !contains(github.event.issue.labels.*.name, 'do-not-ai') &&
        !contains(github.event.issue.labels.*.name, 'blocked'))

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          timeout_minutes: 25
